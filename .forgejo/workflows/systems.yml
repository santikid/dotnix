name: Systems CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".forgejo/workflows/systems.yml"
      - "flake.nix"
      - "flake.lock"
      - "hosts/lisbon/**"
      - "hosts/obsidian/**"
      - "hosts/ruby/**"
      - "hosts/santibook/**"
      - "modules/**"
      - "configs/**"

jobs:
  build:
    name: Build ${{ matrix.target.name }}
    strategy:
      matrix:
        target:
          - name: santibook
            runner: nix-aarch64-darwin
            system: aarch64-darwin
            installable: .#darwinConfigurations.santibook.system
          - name: lisbon
            runner: nix-aarch64-darwin
            system: aarch64-darwin
            installable: .#darwinConfigurations.lisbon.system
          - name: obsidian
            runner: nix-x86_64-linux
            system: x86_64-linux
            installable: .#nixosConfigurations.obsidian.config.system.build.toplevel
          - name: ruby
            runner: nix-x86_64-linux
            system: x86_64-linux
            installable: .#nixosConfigurations.ruby.config.system.build.toplevel
    runs-on: ${{ matrix.target.runner }}
    env:
      NIX_CONFIG: |
        experimental-features = nix-command flakes
    steps:
      - name: Install Node.js for actions
        if: matrix.target.system == 'x86_64-linux'
        run: |
          nix profile install nixpkgs#nodejs_24
          printf '%s\n' /root/.nix-profile/bin >> "$FORGEJO_PATH"

      - name: Check out the repository
        uses: https://data.forgejo.org/actions/checkout@v6

      - name: Verify runner tools
        run: |
          node --version
          nix --version
          test "$(nix eval --impure --raw --expr 'builtins.currentSystem')" = "${{ matrix.target.system }}"

      - name: Evaluate system
        run: |
          nix eval --raw "${{ matrix.target.installable }}.drvPath"
          printf '\n'

      - name: Build system
        run: |
          nix build \
            --no-link \
            --print-out-paths \
            --max-jobs 1 \
            --cores 2 \
            "${{ matrix.target.installable }}"
